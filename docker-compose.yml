services:
  swemo-mcp:
    build: .
    ports:
      - "8809:8809"
    env_file:
      - .env
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "http"
      - "swemo-mcp:8809"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4041:4040"  # ngrok dashboard (4040 reserved for doclib if running)
    depends_on:
      - swemo-mcp
